    .dash-section { padding: 50px 0 80px; }
    .dash-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;

    .btn-dash {

      padding: 10px 20px; border-radius: 50px; font-weight: 600; font-size: .9rem;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .btn-dash-primary { background: var(--accent-color, #0d6efd); color: #fff; box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .btn-dash-primary:hover { transform: translateY(-2px); color: #fff; }
    .btn-dash-outline { background: #fff; color: #212529; border: 1.5px solid #dcdfe4; }
    .btn-dash-outline:hover { border-color: var(--accent-color, #0d6efd); color: #212529; }

    .dash-table-wrap { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.06); overflow: hidden; }
    table.dash-table { width: 100%; border-collapse: collapse; }
    .dash-table th {
      text-align: left; padding: 16px 20px; font-size: .78rem; text-transform: uppercase;
      letter-spacing: .05em; color: #6c757d; border-bottom: 1px solid #eceef1; background: #f8f9fb;
    }
    .dash-table td { padding: 16px 20px; border-bottom: 1px solid #f1f3f6; font-size: .92rem; vertical-align: middle; }
    .dash-table tr:last-child td { border-bottom: none; }
    .dash-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #f1f3f6; }
    .dash-thumb-empty {
      width: 48px; height: 48px; border-radius: 8px; background: #f1f3f6;
      display: flex; align-items: center; justify-content: center; color: #adb5bd; font-size: .7rem;
    }
    .dash-category-pill {
      display: inline-block; background: #f1f3f6; color: #495057; font-size: .78rem;
      padding: 4px 12px; border-radius: 50px;
    }
    .dash-row-actions a { font-size: .85rem; font-weight: 600; margin-right: 14px; text-decoration: none; }
    .dash-row-actions a.edit-link { color: var(--accent-color, #0d6efd); }
    .dash-row-actions a.delete-link { color: #b3261e; }
    .dash-status { text-align: center; padding: 60px 0; color: #6c757d; }

  <!-- ============================================================
       This page is fully static — no server-side templating. It:
       1. Confirms there's a valid admin session via /api/auth/me
          (redirects to login.html if not — same guard the backend
          itself enforces on /admin/*, this is just so the page
          doesn't flash empty content first).
       2. Lists products from the existing public /api/products
          endpoint (no new backend route needed for that).
       3. Add/Edit/Delete/Manage-ads/Manage-admins still go to the
          backend's existing server-rendered /admin/* form pages —
          those aren't JSON endpoints yet, so this links out to them
          as normal same-origin navigations (the session cookie set
          at login carries over automatically).
       ============================================================ -->
  <script>
    // TODO: set this to wherever the FastAPI app is actually deployed.
    const API_BASE_URL = "http://127.0.0.1:8000";

    const dashRoot = document.getElementById("dash-root");
    const statusEl = document.getElementById("dash-status");
    const rowsEl = document.getElementById("product-rows");

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function readCookie(name) {
      const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
      return match ? decodeURIComponent(match[2]) : null;
    }

    async function ensureCsrfToken() {
      if (readCookie("csrf_token")) return;
      await fetch(`${API_BASE_URL}/api/auth/csrf`, { credentials: "include" });
    }

    function productRowHTML(product) {
      const thumb = product.primary_image
        ? `<img class="dash-thumb" src="${product.primary_image.url}" alt="${escapeHtml(product.name)}">`
        : `<div class="dash-thumb-empty">—</div>`;
      const category = product.category
        ? `<span class="dash-category-pill">${escapeHtml(product.category.name)}</span>`
        : "";

      return `
        <tr>
          <td>${thumb}</td>
          <td>${escapeHtml(product.name)}</td>
          <td>${category}</td>
          <td>${escapeHtml(product.summary || "")}</td>
          <td class="dash-row-actions">
            <a class="edit-link" href="${API_BASE_URL}/admin/products/${product.id}/edit">Edit</a>
            <a class="delete-link" href="#" data-id="${product.id}" data-name="${escapeHtml(product.name)}">Delete</a>
          </td>
        </tr>`;
    }

    async function loadProducts() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/products`);
        const data = await res.json();
        const products = data.products || [];

        rowsEl.innerHTML = products.length
          ? products.map(productRowHTML).join("")
          : `<tr><td colspan="5" class="text-center text-muted py-4">No products yet.</td></tr>`;

        // Delete links post a real form to the existing (session-protected)
        // backend delete route — a same-origin navigation, cookie included.
        rowsEl.querySelectorAll(".delete-link").forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const { id, name } = link.dataset;
            if (!confirm(`Delete "${name}"?`)) return;

            const form = document.createElement("form");
            form.method = "post";
            form.action = `${API_BASE_URL}/admin/products/${id}/delete`;
            document.body.appendChild(form);
            form.submit();
          });
        });
      } catch (err) {
        console.error("Failed to load products", err);
        rowsEl.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Couldn't load products.</td></tr>`;
      }
    }

    async function init() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/me`, { credentials: "include" });
        if (!res.ok) {
          window.location.href = "login.html";
          return;
        }
        const user = await res.json();

        document.getElementById("user-chip-text").textContent = `Signed in as ${user.name || user.email}`;
        document.getElementById("add-product-link").href = `${API_BASE_URL}/admin/products/new`;
        document.getElementById("manage-ads-link").href = `${API_BASE_URL}/admin/ads`;
        document.getElementById("manage-admins-link").href = `${API_BASE_URL}/admin/users`;

        statusEl.style.display = "none";
        dashRoot.style.display = "";

        await ensureCsrfToken();
        await loadProducts();
      } catch (err) {
        console.error("Session check failed", err);
        statusEl.textContent = `Couldn't reach the server. Is the API running at ${API_BASE_URL}?`;
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      try {
        const csrf = readCookie("csrf_token");
        await fetch(`${API_BASE_URL}/api/auth/logout`, {
          method: "POST",
          credentials: "include",
          headers: { "x-csrf-token": csrf || "" },
        });
      } catch (err) {
        console.error("Logout failed", err);
      }
      window.location.href = "login.html";
    });

    init();
  </script>

</body>
